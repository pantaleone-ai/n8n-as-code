name: Release

on:
  push:
    branches: [main, next]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for npm trusted publishing (OIDC)

jobs:
  release-please:
    name: Release Please
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      # Per-package outputs
      cli_release_created: ${{ steps.release.outputs['packages/cli--release_created'] }}
      skills_release_created: ${{ steps.release.outputs['packages/skills--release_created'] }}
      transformer_release_created: ${{ steps.release.outputs['packages/transformer--release_created'] }}
      vscode_release_created: ${{ steps.release.outputs['packages/vscode-extension--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: release-please
    # Run on next (pre-release) OR on main when release-please created releases
    if: |
      always() && (
        github.ref == 'refs/heads/next' ||
        (needs.release-please.result == 'success' && needs.release-please.outputs.releases_created == 'true')
      )
    environment: ${{ github.ref == 'refs/heads/next' && 'next' || 'prod' }}
    steps:
      - name: Set dist-tag
        id: dist
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/next" ]]; then
            echo "tag=next" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org/'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Cache n8n repository
        uses: actions/cache@v4
        with:
          path: .n8n-cache
          key: ${{ runner.os }}-n8n-cache-${{ hashFiles('scripts/ensure-n8n-cache.cjs') }}
          restore-keys: |
            ${{ runner.os }}-n8n-cache-

      - name: Compute pre-release versions (next only)
        if: github.ref == 'refs/heads/next'
        run: |
          SHA=$(git rev-parse --short HEAD)
          for pkg in packages/transformer packages/skills packages/cli; do
            NAME=$(node -p "require('./$pkg/package.json').name")
            BASE=$(node -p "require('./$pkg/package.json').version.split('-')[0] + '-next'")
            # --no-package-lock prevents npm from resolving the new version against
            # the registry (the version doesn't exist yet — it's published later).
            npm version "${BASE}.${SHA}" --no-git-tag-version --no-package-lock --workspace="$NAME"
          done

      - name: Pin inter-package dependencies (next only)
        if: github.ref == 'refs/heads/next'
        run: |
          TRANSFORMER_VERSION=$(node -p "require('./packages/transformer/package.json').version")
          SKILLS_VERSION=$(node -p "require('./packages/skills/package.json').version")
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          # Pin skills -> transformer
          npm pkg set "dependencies.@n8n-as-code/transformer=${TRANSFORMER_VERSION}" --workspace=@n8n-as-code/skills
          # Pin cli -> skills and transformer
          npm pkg set "dependencies.@n8n-as-code/skills=${SKILLS_VERSION}" --workspace=n8nac
          npm pkg set "dependencies.@n8n-as-code/transformer=${TRANSFORMER_VERSION}" --workspace=n8nac
          # Pin vscode-extension -> cli (ensures npm workspace symlinks the local
          # bumped n8nac instead of falling back to the published registry version)
          npm pkg set "dependencies.n8nac=${CLI_VERSION}" --workspace=n8n-as-code

      - name: Pin inter-package dependencies (main)
        if: github.ref == 'refs/heads/main'
        run: |
          TRANSFORMER_VERSION=$(node -p "require('./packages/transformer/package.json').version")
          SKILLS_VERSION=$(node -p "require('./packages/skills/package.json').version")
          # Pin skills -> transformer
          npm pkg set "dependencies.@n8n-as-code/transformer=${TRANSFORMER_VERSION}" --workspace=@n8n-as-code/skills
          # Pin cli -> skills and transformer
          npm pkg set "dependencies.@n8n-as-code/skills=${SKILLS_VERSION}" --workspace=n8nac
          npm pkg set "dependencies.@n8n-as-code/transformer=${TRANSFORMER_VERSION}" --workspace=n8nac

      - name: Normalize VS Code pre-release version (next only)
        if: github.ref == 'refs/heads/next'
        run: |
          # VS Code convention: even minor = stable, odd minor = pre-release.
          # Use (stable_minor + 1) as pre-release minor, and github.run_number as patch
          # so every CI run gets a unique, monotonically increasing version.
          # (git rev-list --count is unreliable in shallow clones)
          BASE=$(node -p "require('./packages/vscode-extension/package.json').version.replace(/-next.*$/, '')")
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          STABLE_MINOR=$(echo "$BASE" | cut -d. -f2)
          PRE_MINOR=$(( STABLE_MINOR + 1 ))
          PATCH=${{ github.run_number }}
          npm version "$MAJOR.$PRE_MINOR.$PATCH" --no-git-tag-version --workspace=n8n-as-code

      - name: Build all packages
        run: npm run build

      # Publish in dependency order: transformer → skills → cli
      # Authentication via OIDC trusted publishing — no token needed
      - name: Publish @n8n-as-code/transformer
        if: github.ref == 'refs/heads/next' || needs.release-please.outputs.transformer_release_created == 'true'
        run: cd packages/transformer && npm publish --access public --tag ${{ steps.dist.outputs.tag }}

      - name: Publish @n8n-as-code/skills
        if: github.ref == 'refs/heads/next' || needs.release-please.outputs.skills_release_created == 'true'
        run: cd packages/skills && npm publish --access public --tag ${{ steps.dist.outputs.tag }}

      - name: Publish n8nac
        if: github.ref == 'refs/heads/next' || needs.release-please.outputs.cli_release_created == 'true'
        run: cd packages/cli && npm publish --access public --tag ${{ steps.dist.outputs.tag }}

      - name: Publish VS Code Extension (pre-release)
        if: github.ref == 'refs/heads/next'
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          cd packages/vscode-extension
          if [[ -z "$VSCE_TOKEN" ]]; then
            echo "❌ VSCE_TOKEN is missing. Add it to GitHub Environment secrets for '${{ github.ref == 'refs/heads/next' && 'next' || 'prod' }}'."
            exit 1
          fi
          VERSION=$(node -p "require('./package.json').version")
          EXISTING=$(curl -s -X POST "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=7.2-preview.1" \
            -H "Content-Type: application/json" \
            -d '{"filters":[{"criteria":[{"filterType":7,"value":"etienne-lescot.n8n-as-code"}]}],"flags":529}' \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).results[0].extensions[0].versions.map(v=>v.version).join('\n')")
          if echo "$EXISTING" | grep -qxF "$VERSION"; then
            echo "⚠️ VS Code Extension v$VERSION already exists on Marketplace, skipping publish."
            exit 0
          fi
          npx @vscode/vsce package --no-dependencies
          npx @vscode/vsce publish --no-dependencies --pre-release --pat "$VSCE_TOKEN"

      - name: Publish VS Code Extension (stable)
        if: github.ref == 'refs/heads/main' && needs.release-please.outputs.vscode_release_created == 'true'
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          cd packages/vscode-extension
          if [[ -z "$VSCE_TOKEN" ]]; then
            echo "❌ VSCE_TOKEN is missing. Add it to GitHub Environment secrets for 'prod'."
            exit 1
          fi
          VERSION=$(node -p "require('./package.json').version")
          EXISTING=$(curl -s -X POST "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=7.2-preview.1" \
            -H "Content-Type: application/json" \
            -d '{"filters":[{"criteria":[{"filterType":7,"value":"etienne-lescot.n8n-as-code"}]}],"flags":529}' \
            | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).results[0].extensions[0].versions.map(v=>v.version).join('\n')")
          if echo "$EXISTING" | grep -qxF "$VERSION"; then
            echo "⚠️ VS Code Extension v$VERSION already exists on Marketplace, skipping publish."
            exit 0
          fi
          npx @vscode/vsce package --no-dependencies
          npx @vscode/vsce publish --no-dependencies --pat "$VSCE_TOKEN"
