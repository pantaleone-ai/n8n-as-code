name: Publish VS Code Extension (Manual)

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Semver bump to apply
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish_vscode:
        description: Publish to VS Code Marketplace
        required: true
        default: true
        type: boolean
      publish_openvsx:
        description: Publish to Open VSX
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'next' && 'next' || 'prod' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: npm install

      - name: Compute publish mode
        id: publish-mode
        run: |
          if [[ "$GITHUB_REF_NAME" != 'main' && "$GITHUB_REF_NAME" != 'next' ]]; then
            echo "❌ This workflow must be run from main or next, got '$GITHUB_REF_NAME'."
            exit 1
          fi

          if [[ "$GITHUB_REF_NAME" == 'next' ]]; then
            echo "pre_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "pre_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch registry versions
        id: registry-versions
        run: |
          MARKETPLACE_VERSIONS=$(curl -s -X POST 'https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery?api-version=7.2-preview.1' \
            -H 'Content-Type: application/json' \
            -d '{"filters":[{"criteria":[{"filterType":7,"value":"etienne-lescot.n8n-as-code"}]}],"flags":529}' \
            | node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync(0,"utf8")); process.stdout.write(JSON.stringify((p.results?.[0]?.extensions?.[0]?.versions||[]).map(v => v.version)));')
          OPENVSX_VERSIONS=$(curl -fsSL https://open-vsx.org/api/etienne-lescot/n8n-as-code \
            | node -e 'const fs=require("fs"); const p=JSON.parse(fs.readFileSync(0,"utf8")); process.stdout.write(JSON.stringify(Object.keys(p.allVersions || {}).filter(v => /^\d+\.\d+\.\d+$/.test(v))));')
          echo "marketplace=$MARKETPLACE_VERSIONS" >> "$GITHUB_OUTPUT"
          echo "openvsx=$OPENVSX_VERSIONS" >> "$GITHUB_OUTPUT"

      - name: Compute target version
        id: target-version
        env:
          MARKETPLACE_VERSIONS: ${{ steps.registry-versions.outputs.marketplace }}
          OPENVSX_VERSIONS: ${{ steps.registry-versions.outputs.openvsx }}
        run: |
          VERSION=$(node -e '
            const fs = require("fs");

            function parseVersion(version) {
              const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version || "");
              if (!match) return null;
              return {
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
              };
            }

            function compareVersions(left, right) {
              if (left.major !== right.major) return left.major - right.major;
              if (left.minor !== right.minor) return left.minor - right.minor;
              return left.patch - right.patch;
            }

            function maxVersion(versions) {
              return versions.reduce((highest, current) => {
                if (!highest) return current;
                return compareVersions(current, highest) > 0 ? current : highest;
              }, null);
            }

            const pkg = require("./packages/vscode-extension/package.json");
            const localVersion = parseVersion(pkg.version.split("-")[0]);
            const marketplaceVersions = JSON.parse(process.env.MARKETPLACE_VERSIONS || "[]").map(parseVersion).filter(Boolean);
            const openvsxVersions = JSON.parse(process.env.OPENVSX_VERSIONS || "[]").map(parseVersion).filter(Boolean);
            const bump = process.argv[1];
            const baseVersion = maxVersion([localVersion, ...marketplaceVersions, ...openvsxVersions]);
            if (!baseVersion) {
              throw new Error("Unable to determine base version.");
            }
            const nextVersion = { ...baseVersion };
            if (bump === "major") {
              nextVersion.major += 1;
              nextVersion.minor = 0;
              nextVersion.patch = 0;
            } else if (bump === "minor") {
              nextVersion.minor += 1;
              nextVersion.patch = 0;
            } else if (bump === "patch") {
              nextVersion.patch += 1;
            } else {
              throw new Error("Unsupported bump type: " + bump);
            }
            process.stdout.write([nextVersion.major, nextVersion.minor, nextVersion.patch].join("."));
          ' '${{ inputs.bump_type }}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ℹ️ Target version: $VERSION"
          if [[ '${{ steps.publish-mode.outputs.pre_release }}' == 'true' ]]; then
            echo "ℹ️ Publishing from $GITHUB_REF_NAME as a VS Marketplace pre-release."
          else
            echo "ℹ️ Publishing from $GITHUB_REF_NAME as a stable release."
          fi
          if [[ '${{ inputs.publish_vscode }}' != 'true' && '${{ inputs.publish_openvsx }}' != 'true' ]]; then
            echo "❌ Select at least one publish target."
            exit 1
          fi
          if [[ '${{ steps.publish-mode.outputs.pre_release }}' == 'true' && '${{ inputs.publish_openvsx }}' == 'true' ]]; then
            echo "⚠️ Open VSX does not provide a safe preview channel separation. This will publish a normal Open VSX version."
          fi

      - name: Build/package/publish extension
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
          MARKETPLACE_VERSIONS: ${{ steps.registry-versions.outputs.marketplace }}
        run: |
          if [[ '${{ inputs.publish_vscode }}' == 'true' && -z "$VSCE_TOKEN" ]]; then
            echo "❌ VSCE_TOKEN is missing in the selected environment secrets."
            exit 1
          fi

          cd packages/vscode-extension

          # Remove "private" flag without committing (prevents vsce from rejecting the package)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            delete pkg.private;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          node ../../scripts/set-version-if-needed.mjs --target '${{ steps.target-version.outputs.version }}' --package-json package.json
          npm run build
          npx @vscode/vsce package --no-dependencies

          if [[ '${{ inputs.publish_vscode }}' != 'true' ]]; then
            echo "ℹ️ Skipping VS Code Marketplace publish."
          elif echo "$MARKETPLACE_VERSIONS" | node -e 'const fs=require("fs"); const versions=JSON.parse(fs.readFileSync(0,"utf8")); process.exit(versions.includes(process.argv[1]) ? 0 : 1);' '${{ steps.target-version.outputs.version }}'; then
            echo "⚠️ VS Code Marketplace version ${{ steps.target-version.outputs.version }} already exists, skipping Marketplace publish."
          elif [[ '${{ steps.publish-mode.outputs.pre_release }}' == 'true' ]]; then
            npx @vscode/vsce publish --no-dependencies --pre-release --pat "$VSCE_TOKEN"
          else
            npx @vscode/vsce publish --no-dependencies --pat "$VSCE_TOKEN"
          fi

          if [[ '${{ inputs.publish_openvsx }}' != 'true' ]]; then
            echo "ℹ️ Skipping Open VSX publish."
          elif [[ -z "$OVSX_TOKEN" ]]; then
            echo "⚠️ OVSX_TOKEN is missing, skipping Open VSX publish."
          else
            if [[ '${{ steps.publish-mode.outputs.pre_release }}' == 'true' ]]; then
              echo "⚠️ Publishing a pre-release build to Open VSX as a normal registry version."
            fi
            npx ovsx publish *.vsix -p "$OVSX_TOKEN"
          fi
